<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit-Ready Systems</title>
    <style>
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0B0F19;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    margin: 0;
}

.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(99, 102, 241, 0.1);
    border-radius: 16px;
    padding: 60px 40px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    text-align: center;
    max-width: 500px;
    margin: auto;
}

.header-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
}

.logo {
    width: 50px;
    height: 50px;
    flex-shrink: 0;
}

.header-text {
    text-align: left;
}

h1 {
    font-size: 2.5rem;
    font-weight: 800;
    margin-bottom: 5px;
    background: linear-gradient(135deg, #FFFFFF 0%, #C0C5D8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
}

.status {
    font-size: 0.9rem;
    color: #94A3B8;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.coming-soon {
    display: inline-block;
    background: #6366F1;
    color: white;
    padding: 14px 28px;
    border-radius: 8px;
    font-weight: 600;
    margin-bottom: 40px;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
    border: 1px solid rgba(99, 102, 241, 0.2);
    text-decoration: none;
}

.coming-soon:hover {
    background: #5558E3;
    border-color: rgba(99, 102, 241, 0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(99, 102, 241, 0.15);
}

.contact {
    font-size: 0.95rem;
    color: #6B7280;
    margin-top: 30px;
    letter-spacing: 0.01em;
}

.contact a {
    color: #6366F1;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
}

.contact a:hover {
    color: #818CF8;
    text-decoration: underline;
}

footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    width: 100%;
}

.footer-links {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    margin-bottom: 10px;
}

.footer-links a {
    color: #E5E7EB;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9em;
    white-space: nowrap;
}

.footer-copyright {
    text-align: center;
    font-size: 0.75em;
    color: #94A3B8;
    margin: 10px 0 0;
}

@media (max-width: 480px) {
    footer a {
        font-size: 0.8rem;
    }
}
</style>
</head>
<body>
    <div class="main-content">
        <div class="container">
            <div class="header-container">
                <svg class="logo" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#312E81;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <path d="M25 5 L45 15 L45 25 Q45 35 25 45 Q5 35 5 25 L5 15 Z" fill="url(#shieldGradient)" stroke="none"/>
                    <path d="M15 20 Q15 15 20 15 L25 15 Q30 15 30 20 L30 25 Q30 30 25 30 L20 30 Q15 30 15 25 Z" fill="none" stroke="white" stroke-width="2"/>
                    <path d="M20 25 L23 28 L30 21" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <div class="header-text">
                    <h1>Audit-Ready Systems</h1>
                    <div class="status">ENTERPRISE AI AUDIT INFRASTRUCTURE</div>
                </div>
            </div>
            <div class="coming-soon">Coming Soon</div>
            <div class="contact">
                Contact: <a href="mailto:admin@auditready.systems">admin@auditready.systems</a>
            </div>
        </div>
    </div>
    <footer>
        <div class="footer-links">
            <a href="legal.html#privacy" style="color: #E5E7EB; text-decoration: none; font-weight: 600; font-size: 0.9em; white-space: nowrap;">Privacy Policy</a>
            <a href="legal.html#terms" style="color: #E5E7EB; text-decoration: none; font-weight: 600; font-size: 0.9em; white-space: nowrap;">Terms of Service</a>
            <a href="legal.html#disclosure" style="color: #E5E7EB; text-decoration: none; font-weight: 600; font-size: 0.9em; white-space: nowrap;">Trust Disclosure</a>
        </div>
        <div class="footer-copyright">
            <p style="text-align: center; font-size: 0.75em; color: #94A3B8; margin: 10px 0 0;">Audit-Ready Systems is an Independent Platform &copy; 2026</p>
        </div>
    </footer>
</body>
</html>
