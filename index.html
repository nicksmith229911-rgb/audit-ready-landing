<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit-Ready Systems</title>
    <style>
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0B0F19;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #E5E7EB;
    margin: 0;
}

.container {
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(99, 102, 241, 0.1);
    border-radius: 16px;
    padding: 60px 40px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    text-align: center;
    max-width: 500px;
    margin: 20px;
}

h1 {
    font-size: 2.5rem;
    font-weight: 800;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #FFFFFF 0%, #C0C5D8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
}

.status {
    font-size: 1.1rem;
    color: #9CA3AF;
    margin-bottom: 30px;
    font-weight: 500;
    letter-spacing: 0.01em;
}

.coming-soon {
    display: inline-block;
    background: #6366F1;
    color: white;
    padding: 14px 28px;
    border-radius: 8px;
    font-weight: 600;
    margin-bottom: 40px;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
    border: 1px solid rgba(99, 102, 241, 0.2);
    text-decoration: none;
}

.coming-soon:hover {
    background: #5558E3;
    border-color: rgba(99, 102, 241, 0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(99, 102, 241, 0.15);
}

.contact {
    font-size: 0.95rem;
    color: #6B7280;
    margin-top: 30px;
    letter-spacing: 0.01em;
}

.contact a {
    color: #6366F1;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s ease;
}

.contact a:hover {
    color: #818CF8;
    text-decoration: underline;
}
</style>
</head>
<body>
    <div class="container">
        <h1>Audit-Ready Systems</h1>
        <div class="status">Enterprise AI Audit Infrastructure</div>
        <div class="coming-soon">Coming Soon</div>
        <div class="contact">
            Contact: <a href="mailto:admin@auditready.systems">admin@auditready.systems</a>
        </div>
    </div>
</body>
</html>
